<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>hi bro</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0a0c;
    --panel: #131318;
    --panel-2: #181820;
    --border: #25252e;
    --text: #e8e8ea;
    --muted: #7a7a85;
    --accent: #22c55e;
    --accent-stop: #ef4444;
    --user: #2b6cff;
    --done: #22c55e;
    --warn: #facc15;
    --err: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 1.05rem; font-weight: 600; margin: 0; letter-spacing: -.01em; }
  h2 { font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 .65rem; }

  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 1.25rem;
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.25rem;
    height: 100vh;
  }
  .col { min-height: 0; display: flex; flex-direction: column; gap: 1rem; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel.flex { flex: 1; }

  /* ===== Sessions / Tasks (left) ===== */
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .65rem; }
  .section-head h2 { margin: 0; }
  .icon-btn-sm {
    width: 22px; height: 22px;
    border: 0; border-radius: 6px;
    background: var(--panel-2); color: var(--muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .12s;
  }
  .icon-btn-sm:hover { background: var(--user); color: white; }
  .icon-btn-sm svg { width: 12px; height: 12px; }

  .session-list, .task-list { display: flex; flex-direction: column; gap: .4rem; overflow-y: auto; }
  .session-list::-webkit-scrollbar, .task-list::-webkit-scrollbar { width: 6px; }
  .session-list::-webkit-scrollbar-thumb, .task-list::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 3px; }

  .session-row {
    display: flex; align-items: center; gap: .5rem;
    padding: .55rem .7rem;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: all .12s;
  }
  .session-row:hover { border-color: #383844; }
  .session-row.active { border-color: var(--user); background: rgba(43, 108, 255, .08); }
  .session-row .name { flex: 1; font-size: .8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-row .dot { width: 7px; height: 7px; border-radius: 50%; background: #555; flex-shrink: 0; }
  .session-row.live .dot { background: var(--done); animation: pulse 1.6s ease-in-out infinite; }
  .session-row.busy .dot { background: var(--user); animation: pulse 1s ease-in-out infinite; }
  .session-row .stop-btn {
    width: 20px; height: 20px;
    border: 0; border-radius: 5px;
    background: transparent; color: var(--muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: all .12s;
  }
  .session-row:hover .stop-btn { opacity: 1; }
  .session-row .stop-btn:hover { background: var(--err); color: white; }
  .session-row .stop-btn svg { width: 10px; height: 10px; }
  .session-row .cloud-link {
    width: 20px; height: 20px;
    border-radius: 5px;
    background: transparent; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    opacity: 0; transition: all .12s;
  }
  .session-row:hover .cloud-link { opacity: 1; }
  .session-row .cloud-link:hover { background: var(--user); color: white; }
  .session-row .cloud-link svg { width: 11px; height: 11px; }

  .card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .card.running { border-color: var(--user); }
  .card.done    { border-color: var(--done); }
  .card.error   { border-color: var(--err); }
  .card.stopped { border-color: var(--warn); }
  .card-head { display: flex; align-items: center; gap: .5rem; padding: .55rem .7rem; cursor: pointer; user-select: none; }
  .card-head .task { font-size: .76rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-head .pill { font-size: .55rem; padding: .12rem .42rem; border-radius: 999px; background: #2a2a32; color: #ccc; text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .card.running .pill { background: var(--user); color: white; }
  .card.done    .pill { background: var(--done); color: #001; }
  .card.error   .pill { background: var(--err); color: white; }
  .card.stopped .pill { background: var(--warn); color: #001; }
  .card-body { padding: 0 .7rem .65rem; font-size: .72rem; color: #bbb; max-height: 240px; overflow-y: auto; display: none; }
  .card.expanded .card-body { display: block; }
  .card-body .preview { color: #888; font-size: .68rem; margin-bottom: .35rem; padding-bottom: .35rem; border-bottom: 1px solid var(--border); }
  .card-body .output  { white-space: pre-wrap; line-height: 1.4; }
  .card-body .step    { color: #6c6c78; font-size: .65rem; padding: .1rem 0; }

  .empty { color: var(--muted); font-size: .75rem; text-align: center; padding: 1.25rem 0; }

  /* ===== Chat (center) ===== */
  .chat-panel { padding: 0; flex: 1; }
  .chat-header { padding: .9rem 1.1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .chat {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 1.1rem;
    display: flex; flex-direction: column; gap: .65rem;
  }
  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 3px; }
  .msg { max-width: 78%; padding: .6rem .8rem; border-radius: 14px; font-size: .85rem; line-height: 1.45; word-wrap: break-word; }
  .msg.user      { align-self: flex-end;   background: var(--user); color: white; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--panel-2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.system    { align-self: center; background: transparent; color: var(--muted); font-size: .7rem; padding: .15rem .55rem; font-style: italic; }
  .msg.system.err { color: var(--err); }
  /* Markdown rendering inside assistant bubbles */
  .msg.assistant > * { margin: 0; }
  .msg.assistant p { margin: 0 0 .55em; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  .msg.assistant strong { font-weight: 600; color: #fff; }
  .msg.assistant em { font-style: italic; }
  .msg.assistant ul, .msg.assistant ol { margin: .35em 0 .55em; padding-left: 1.25em; }
  .msg.assistant li { margin: .15em 0; }
  .msg.assistant code { background: rgba(255,255,255,0.08); padding: .1em .35em; border-radius: 4px; font-size: .85em; font-family: ui-monospace, monospace; }
  .msg.assistant pre { background: rgba(0,0,0,0.35); padding: .65em .8em; border-radius: 7px; overflow-x: auto; margin: .5em 0; }
  .msg.assistant pre code { background: none; padding: 0; font-size: .8em; }
  .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 { font-size: .95em; font-weight: 600; margin: .55em 0 .3em; color: #fff; }
  .msg.assistant h1:first-child, .msg.assistant h2:first-child, .msg.assistant h3:first-child { margin-top: 0; }
  .msg.assistant a { color: #6cf; text-decoration: underline; }
  .msg.assistant table { border-collapse: collapse; margin: .5em 0; font-size: .82em; display: block; max-width: 100%; overflow-x: auto; }
  .msg.assistant th, .msg.assistant td { border: 1px solid var(--border); padding: .35em .6em; text-align: left; }
  .msg.assistant th { background: rgba(255,255,255,0.05); font-weight: 600; }
  .msg.assistant blockquote { border-left: 3px solid var(--border); margin: .4em 0; padding: 0 .8em; color: var(--muted); }
  /* Live "thinking" bubble while a task is running */
  .msg.assistant.pending { color: var(--muted); font-style: italic; }
  .msg.assistant.pending::before {
    content: '●';
    display: inline-block;
    margin-right: .55em;
    color: var(--user);
    animation: pulse 1.1s ease-in-out infinite;
  }
  .chat-empty {
    color: var(--muted);
    text-align: center;
    font-size: 1rem;
    align-self: center;
    margin-top: auto;       /* push to lower-center of the chat panel */
    padding: 1.5rem 1rem 2rem;
  }
  .chat-empty .trigger-word {
    display: block;
    font-size: 3.4rem;
    font-weight: 800;
    color: var(--accent);   /* green */
    margin-top: .55rem;
    letter-spacing: -.025em;
    text-transform: lowercase;
    text-shadow: 0 2px 18px rgba(34, 197, 94, 0.25);
  }
  /* Big "Listening to your commands" banner */
  .listening-banner {
    align-self: center;
    display: flex; flex-direction: column; align-items: center;
    gap: .9rem;
    padding: 3rem 0 1rem;
    color: var(--text);
  }
  .listening-banner .mic {
    font-size: 3rem;
    line-height: 1;
    animation: pulse 1s ease-in-out infinite;
  }
  .listening-banner .label {
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: -.015em;
    text-align: center;
  }

  .log-section { border-top: 1px solid var(--border); }
  .log-section summary {
    padding: .55rem 1.1rem;
    cursor: pointer; list-style: none;
    font-size: .65rem; text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted); font-weight: 600;
    display: flex; align-items: center; gap: .35rem;
    user-select: none;
  }
  .log-section summary::-webkit-details-marker { display: none; }
  .log-section summary::before { content: '▸'; font-size: .6rem; transition: transform .15s; }
  .log-section[open] summary::before { transform: rotate(90deg); }
  .log-list {
    padding: 0 1.1rem .9rem;
    max-height: 160px;
    overflow-y: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: .66rem;
    color: var(--muted);
    line-height: 1.55;
  }
  .log-list .log-line { padding: .12rem 0; }
  .log-list .ts { color: #555; margin-right: .5rem; }

  .chat-controls {
    padding: .55rem .8rem;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: flex-end; gap: .6rem;
  }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 50%; border: 0;
    background: var(--accent); color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    box-shadow: 0 1px 6px rgba(34, 197, 94, 0.25);
  }
  .icon-btn:hover { transform: scale(1.08); }
  .icon-btn:active { transform: scale(0.94); }
  .icon-btn.running { background: var(--accent-stop); box-shadow: 0 1px 6px rgba(239, 68, 68, 0.3); }
  .icon-btn svg { width: 13px; height: 13px; }
  /* Hide the small text indicator now that the big chat display conveys state */
  .status-text { display: none; }
  /* Big clickable trigger word in the empty chat */
  .chat-empty.clickable { cursor: pointer; transition: opacity .15s, transform .15s; }
  .chat-empty.clickable:hover { opacity: .82; }
  .chat-empty.clickable:hover .trigger-word { transform: scale(1.025); }
  .chat-empty .trigger-word { transition: transform .15s; }
  /* "First, add your API key" call-to-action — replaces the play button when no key */
  .needs-key-btn {
    display: inline-flex; align-items: center; gap: .55rem;
    padding: .7rem 1.1rem;
    background: var(--warn); color: #1a1a08;
    border: 0; border-radius: 999px;
    font-size: .85rem; font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    box-shadow: 0 2px 14px rgba(250, 204, 21, 0.3);
    animation: pulse 2.2s ease-in-out infinite;
  }
  .needs-key-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
  .needs-key-btn svg { width: 16px; height: 16px; }
  .needs-key-btn[hidden] { display: none; }
  .icon-btn[hidden] { display: none; }
  .status-text[hidden] { display: none; }
  .status-text { font-size: .76rem; color: var(--muted); min-width: 90px; transition: color .15s; }
  .status-text.live  { color: var(--accent); }
  .status-text.armed { color: var(--warn); animation: pulse 0.7s ease-in-out infinite; }
  .status-text.busy  { color: var(--user); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  /* ===== Settings (right) ===== */
  .settings-panel label { display: block; margin: .55rem 0 .22rem; font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
  .settings-panel input, .settings-panel select {
    width: 100%; padding: .5rem .65rem;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font-size: .8rem; font-family: inherit;
    transition: border-color .15s;
  }
  .settings-panel input:focus, .settings-panel select:focus { outline: none; border-color: var(--user); }
  .settings-body { display: flex; flex-direction: column; gap: 1.6rem; }
  .settings-group { display: flex; flex-direction: column; }
  .settings-group h3 {
    margin: 0 0 .4rem;
    font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em;
    color: var(--muted);
    padding-bottom: .35rem;
    border-bottom: 1px solid var(--border);
  }
  .settings-group label:first-of-type { margin-top: .55rem; }
  .settings-panel label.checkbox-row {
    display: flex; align-items: center; gap: .55rem;
    margin: .85rem 0 .2rem;
    text-transform: none; letter-spacing: 0; font-weight: 500;
    font-size: .82rem; color: var(--text); cursor: pointer;
  }
  .settings-panel label.checkbox-row input { width: auto; margin: 0; accent-color: var(--user); }
  details { margin-top: .9rem; border-top: 1px solid var(--border); padding-top: .7rem; }
  details summary {
    cursor: pointer; list-style: none;
    font-size: .67rem; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); font-weight: 600;
    display: flex; align-items: center; gap: .35rem;
    user-select: none;
  }
  details summary::-webkit-details-marker { display: none; }
  details summary::before { content: '▸'; font-size: .62rem; transition: transform .15s; }
  details[open] summary::before { transform: rotate(90deg); }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; height: auto; gap: 1rem; padding: 1rem; }
    .col { min-height: auto; }
    .panel { min-height: auto; }
    .session-list { max-height: 220px; }
    .chat { max-height: 50vh; min-height: 280px; }
    .col.center { order: 1; }
    .col.left   { order: 2; }
  }

  /* ===== Settings modal ===== */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .15s;
  }
  .modal-backdrop[data-open="true"] { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: min(420px, calc(100vw - 2rem));
    max-height: calc(100vh - 3rem);
    overflow-y: auto;
    padding: 1.4rem 1.5rem;
    transform: translateY(8px);
    transition: transform .15s;
  }
  .modal-backdrop[data-open="true"] .modal { transform: translateY(0); }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .8rem; }
  .modal-head h2 { margin: 0; }
  .modal-close {
    width: 28px; height: 28px; border: 0; border-radius: 6px;
    background: var(--panel-2); color: var(--muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--err); color: white; }
  .modal-close svg { width: 14px; height: 14px; }

  /* Header action group */
  .chat-header-actions { display: flex; align-items: center; gap: .5rem; }
  /* "See live" button */
  .live-btn {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .42rem .8rem;
    background: var(--user); color: white;
    border: 0; border-radius: 8px;
    font-size: .76rem; font-weight: 600;
    text-decoration: none; cursor: pointer;
    transition: all .12s;
    box-shadow: 0 1px 6px rgba(43, 108, 255, 0.25);
  }
  .live-btn:hover { background: #1e5ce0; transform: translateY(-1px); }
  .live-btn:active { transform: translateY(0); }
  .live-btn svg { width: 12px; height: 12px; }
  .live-btn[hidden] { display: none; }
  /* Gear icon button in chat header */
  .gear-btn {
    width: 30px; height: 30px;
    border: 0; border-radius: 7px;
    background: transparent; color: var(--muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .12s;
  }
  .gear-btn:hover { background: var(--panel-2); color: var(--text); }
  .gear-btn svg { width: 16px; height: 16px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
</head>
<body>

<div class="app">
  <!-- ===== LEFT: Chats ===== -->
  <div class="col left">
    <div class="panel flex">
      <div class="section-head">
        <h2>Chats</h2>
        <button id="newSessionBtn" class="icon-btn-sm" title="New chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
      <div id="sessionList" class="session-list"></div>
    </div>
  </div>

  <!-- ===== CENTER: Chat ===== -->
  <div class="col center">
    <div class="panel chat-panel">
      <div class="chat-header">
        <h1>hi bro</h1>
        <div class="chat-header-actions">
          <a id="liveBtn" class="live-btn" target="_blank" rel="noopener" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3h7v7"/><path d="M10 14L21 3"/><path d="M21 14v7h-7"/><path d="M3 10V3h7"/></svg>
            See live
          </a>
          <button id="settingsBtn" class="gear-btn" title="Settings" aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="chat" class="chat"></div>
      <div class="chat-controls">
        <span id="statusText" class="status-text">Stopped</span>
        <button id="toggleBtn" class="icon-btn" aria-label="Start">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button id="needKeyBtn" class="needs-key-btn" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          First, add your Browser Use API key
        </button>
      </div>
      <details class="log-section">
        <summary>Log (everything heard) — <span id="wordCount">0</span> words</summary>
        <div id="logList" class="log-list"></div>
      </details>
    </div>
  </div>

</div>

<!-- Settings modal -->
<div id="modalBackdrop" class="modal-backdrop">
  <div class="modal settings-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head">
      <h2 id="modalTitle">Settings</h2>
      <button id="modalCloseBtn" class="modal-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>

    <div class="settings-body">
      <section class="settings-group">
        <h3>Audio devices</h3>
        <label>Microphone</label>
        <select id="micSelect"></select>
        <label>Speaker output</label>
        <select id="speakerSelect"></select>
      </section>

      <section class="settings-group">
        <h3>Voice</h3>
        <label>Trigger word</label>
        <input id="wakeWord" placeholder="bro" />
        <label class="checkbox-row">
          <input type="checkbox" id="speakResults" />
          <span>Read results aloud</span>
        </label>
      </section>

      <section class="settings-group">
        <h3>Browser Use</h3>
        <label>API key</label>
        <input id="apiKey" type="password" placeholder="bu_..." />
        <label>Persistent file system</label>
        <select id="workspaceSelect">
          <option value="">Create new</option>
          <option value="__none__">None</option>
        </select>
        <label>Profile for persistent authentication</label>
        <select id="profileSelect"><option value="">None</option></select>
        <label>Proxy country code</label>
        <input id="proxyCC" placeholder="us" />
      </section>
    </div>
  </div>
</div>

<audio id="ttsAudio" hidden></audio>

<script>
// =========================================================================
// Settings persistence
// =========================================================================
const settings = JSON.parse(localStorage.getItem('chain-ditto') || '{}');
function save() { localStorage.setItem('chain-ditto', JSON.stringify(settings)); }
for (const f of ['wakeWord','apiKey','proxyCC']) {
  const el = document.getElementById(f);
  el.value = settings[f] || (f === 'wakeWord' ? 'bro' : f === 'proxyCC' ? 'us' : '');
  el.addEventListener('input', () => {
    settings[f] = el.value;
    save();
    if (f === 'wakeWord') {
      // Re-render the empty placeholder + status text with the new word.
      try { renderChat(); } catch {}
      try { if (typeof running !== 'undefined' && running && !armed && !taskInFlight) {
        setStatusState('live', waitingLabel());
      } } catch {}
    }
  });
}
// Read-aloud checkbox (defaults to true).
const speakResultsEl = document.getElementById('speakResults');
if (typeof settings.speakResults === 'boolean') {
  speakResultsEl.checked = settings.speakResults;
} else {
  settings.speakResults = false;
  speakResultsEl.checked = false;
  save();
}
speakResultsEl.addEventListener('change', () => { settings.speakResults = speakResultsEl.checked; save(); });
// Drop any old client-side voice secrets from previous versions.
if (settings.elevenKey || settings.voiceId) {
  delete settings.elevenKey; delete settings.voiceId; save();
}
// API key change → refresh dropdowns + bu sessions + show/hide play button
const apiKeyInput = document.getElementById('apiKey');
apiKeyInput.addEventListener('input', () => { try { refreshControls(); } catch {} });
apiKeyInput.addEventListener('change', refreshAllRemoteLists);

// =========================================================================
// Local sessions (multi-session state, persisted in localStorage)
// =========================================================================
const sessionsStore = JSON.parse(localStorage.getItem('chain-ditto-sessions') || 'null') || {
  active: null,
  list: [],
};
// Migrate old "Session N" names → "Chat N".
for (const s of sessionsStore.list) {
  if (s.name && /^Session\s+\d+$/i.test(s.name)) s.name = s.name.replace(/^Session/i, 'Chat');
}
function saveSessions() { localStorage.setItem('chain-ditto-sessions', JSON.stringify(sessionsStore)); }

function uid() { return 'l' + Math.random().toString(36).slice(2, 10); }
function newLocalSession(name) {
  const s = {
    localId: uid(),
    name: name || ('Chat ' + (sessionsStore.list.length + 1)),
    browserUseSessionId: null,
    chat: [],     // {role, text}
    tasks: [],    // {id, task, status, output, steps}
  };
  sessionsStore.list.push(s);
  sessionsStore.active = s.localId;
  saveSessions();
  return s;
}
function getActiveSession() {
  if (!sessionsStore.list.length) return newLocalSession();
  return sessionsStore.list.find(s => s.localId === sessionsStore.active) || sessionsStore.list[0];
}
function setActiveSession(localId) {
  sessionsStore.active = localId;
  saveSessions();
  renderAll();
  refreshLiveBtn();
}

// =========================================================================
// Chat / log
// =========================================================================
const chatEl = document.getElementById('chat');
const logListEl = document.getElementById('logList');
const taskListEl = document.getElementById('taskList'); // null — Tasks panel removed
const sessionListEl = document.getElementById('sessionList');

function renderMarkdown(text) {
  if (typeof marked === 'undefined') return null;
  try {
    const html = marked.parse(text || '', { breaks: true, gfm: true });
    if (typeof DOMPurify !== 'undefined') return DOMPurify.sanitize(html);
    return html;
  } catch { return null; }
}

function renderChat() {
  chatEl.innerHTML = '';
  const s = getActiveSession();
  if (!s.chat.length) {
    const empty = document.createElement('div');
    empty.className = 'chat-empty';
    const w = (getWakeWords()[0] || 'trigger');
    empty.innerHTML = 'Say<span class="trigger-word"></span>';
    empty.querySelector('.trigger-word').textContent = w;
    // If we're not already listening, allow click-to-start.
    if (!running) {
      empty.classList.add('clickable');
      empty.title = 'Click to start listening';
      empty.onclick = () => {
        if (running) return;
        ensureAudioCtx();
        primeAudio();
        startListening();
      };
    }
    chatEl.appendChild(empty);
    return;
  }
  for (const m of s.chat) {
    const div = document.createElement('div');
    if (m.role === 'pending') {
      div.className = 'msg assistant pending';
      div.textContent = m.text || 'working';
    } else if (m.role === 'assistant') {
      div.className = 'msg assistant';
      const html = renderMarkdown(m.text);
      if (html != null) div.innerHTML = html;
      else              div.textContent = m.text;
    } else {
      div.className = 'msg ' + m.role;
      div.textContent = m.text;
    }
    chatEl.appendChild(div);
  }
  chatEl.scrollTop = chatEl.scrollHeight;
}
function addChat(role, text) {
  const s = getActiveSession();
  s.chat.push({ role, text });
  saveSessions();
  renderChat();
}
function addUser(text)      { addChat('user', text); }
function addAssistant(text) { addChat('assistant', text); }
function addSystem(text, isErr=false) { addChat('system' + (isErr ? ' err' : ''), text); }

function pushLog(text) {
  const div = document.createElement('div');
  div.className = 'log-line';
  const t = new Date();
  const hh = String(t.getHours()).padStart(2,'0');
  const mm = String(t.getMinutes()).padStart(2,'0');
  const ss = String(t.getSeconds()).padStart(2,'0');
  const ts = document.createElement('span');
  ts.className = 'ts';
  ts.textContent = `${hh}:${mm}:${ss}`;
  div.appendChild(ts);
  div.appendChild(document.createTextNode(text));
  logListEl.appendChild(div);
  logListEl.scrollTop = logListEl.scrollHeight;
  while (logListEl.children.length > 200) logListEl.removeChild(logListEl.firstChild);
}
function log(...a) { pushLog(a.map(x => typeof x === 'string' ? x : JSON.stringify(x)).join(' ')); }

// =========================================================================
// Render sessions list & tasks list
// =========================================================================
function renderSessions() {
  sessionListEl.innerHTML = '';
  if (!sessionsStore.list.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No sessions';
    sessionListEl.appendChild(empty);
    return;
  }
  for (const s of sessionsStore.list) {
    const row = document.createElement('div');
    row.className = 'session-row' + (s.localId === sessionsStore.active ? ' active' : '');
    if (s.browserUseSessionId) row.classList.add('live');
    const cloudHref = s.browserUseSessionId
      ? `https://cloud.browser-use.com/session/${s.browserUseSessionId}`
      : '';
    row.innerHTML = `
      <span class="dot"></span>
      <span class="name"></span>
      ${cloudHref ? `<a class="cloud-link" href="${cloudHref}" target="_blank" rel="noopener" title="Open in Browser Use Cloud">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3h7v7"/><path d="M10 14L21 3"/><path d="M21 14v7h-7"/><path d="M3 10V3h7"/></svg>
      </a>` : ''}
      <button class="stop-btn" title="Destroy session">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>
      </button>`;
    row.querySelector('.name').textContent = s.name;
    row.onclick = (ev) => {
      if (ev.target.closest('.stop-btn') || ev.target.closest('.cloud-link')) return;
      setActiveSession(s.localId);
    };
    row.querySelector('.stop-btn').onclick = async (ev) => {
      ev.stopPropagation();
      await destroyLocalSession(s.localId);
    };
    sessionListEl.appendChild(row);
  }
}

// Tasks panel removed — left here as a no-op so existing call sites are safe.
function renderTasks() { /* tasks now live inline in the chat */ }

function renderAll() {
  renderSessions();
  renderTasks();
  renderChat();
}

// =========================================================================
// Audio cues
// =========================================================================
let audioCtx = null;
function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq = 880, dur = 120, vol = 0.15) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.value = vol;
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur / 1000);
  osc.stop(audioCtx.currentTime + dur / 1000);
}
function dingDetected() { beep(880, 100); setTimeout(() => beep(1320, 140), 90); }
function dingDispatched() { beep(1100, 80); }
function dingDone()       { beep(660, 120); setTimeout(() => beep(880, 200), 110); }
function dingError()      { beep(220, 200); }

// =========================================================================
// Devices
// =========================================================================
const micSelect = document.getElementById('micSelect');
const speakerSelect = document.getElementById('speakerSelect');
async function listDevices() {
  try { await navigator.mediaDevices.getUserMedia({ audio: true }); } catch {}
  const devs = await navigator.mediaDevices.enumerateDevices();
  micSelect.innerHTML = '';
  speakerSelect.innerHTML = '';
  for (const d of devs) {
    if (d.kind === 'audioinput') {
      const o = document.createElement('option');
      o.value = d.deviceId; o.textContent = d.label || `mic ${d.deviceId.slice(0,6)}`;
      micSelect.appendChild(o);
    }
    if (d.kind === 'audiooutput') {
      const o = document.createElement('option');
      o.value = d.deviceId; o.textContent = d.label || `speaker ${d.deviceId.slice(0,6)}`;
      speakerSelect.appendChild(o);
    }
  }
  if (settings.micId)     micSelect.value     = settings.micId;
  if (settings.speakerId) speakerSelect.value = settings.speakerId;
  applySpeaker();
}
micSelect.addEventListener('change',     () => { settings.micId     = micSelect.value;     save(); });
speakerSelect.addEventListener('change', () => { settings.speakerId = speakerSelect.value; save(); applySpeaker(); });

const ttsAudio = document.getElementById('ttsAudio');
function applySpeaker() {
  if (!settings.speakerId) return;
  if (typeof ttsAudio.setSinkId !== 'function') return;
  ttsAudio.setSinkId(settings.speakerId).catch(e => log('setSinkId error: ' + e.message));
}

// =========================================================================
// Workspaces / Profiles dropdowns
// =========================================================================
const workspaceSelect = document.getElementById('workspaceSelect');
const profileSelect   = document.getElementById('profileSelect');

async function loadWorkspaces() {
  if (!settings.apiKey) return;
  try {
    const r = await fetch('/api/workspaces?apiKey=' + encodeURIComponent(settings.apiKey));
    const j = await r.json();
    if (!r.ok) { log('workspaces error: ' + (j.error || r.status)); return; }
    workspaceSelect.innerHTML = '<option value="">Create new</option><option value="__none__">No workspace</option>';
    for (const w of j.items || []) {
      const o = document.createElement('option');
      o.value = w.id; o.textContent = w.name;
      workspaceSelect.appendChild(o);
    }
    if (settings.workspaceId) workspaceSelect.value = settings.workspaceId;
  } catch (e) { log('workspaces fetch failed: ' + e.message); }
}
async function loadProfiles() {
  if (!settings.apiKey) return;
  try {
    const r = await fetch('/api/profiles?apiKey=' + encodeURIComponent(settings.apiKey));
    const j = await r.json();
    if (!r.ok) { log('profiles error: ' + (j.error || r.status)); return; }
    profileSelect.innerHTML = '<option value="">None</option>';
    for (const p of j.items || []) {
      const o = document.createElement('option');
      o.value = p.id; o.textContent = p.name;
      profileSelect.appendChild(o);
    }
    if (settings.profileId) profileSelect.value = settings.profileId;
  } catch (e) { log('profiles fetch failed: ' + e.message); }
}
workspaceSelect.addEventListener('change', () => { settings.workspaceId = workspaceSelect.value; save(); });
profileSelect.addEventListener('change',   () => { settings.profileId   = profileSelect.value;   save(); });

async function refreshAllRemoteLists() {
  await Promise.all([loadWorkspaces(), loadProfiles()]);
}

// =========================================================================
// TTS
// =========================================================================
let audioPrimed = false;
function primeAudio() {
  if (audioPrimed) return;
  ttsAudio.src = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAACAAAEgABVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq////////////////////////////////AAAAAExhdmM1OC4xMwAAAAAAAAAAAAAAACQDQAAAAAAAAASA9rqwOgAAAAAAAAAAAAAAAAAAAAAA';
  ttsAudio.play().then(() => { audioPrimed = true; }).catch(() => {});
}
function speakBrowser(text) {
  if (!text || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.05;
  speechSynthesis.speak(u);
}
let ttsAvailable = false;
let sttAvailable = false;
async function checkVoiceAvailable() {
  try {
    const r = await fetch('/api/voice/available');
    const j = await r.json();
    ttsAvailable = !!j.tts;
    sttAvailable = !!j.stt;
  } catch { ttsAvailable = false; sttAvailable = false; }
}
// Legacy alias.
const checkTtsAvailable = checkVoiceAvailable;
async function speakElevenLabs(text) {
  const r = await fetch('/api/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  });
  if (!r.ok) {
    let body; try { body = await r.json(); } catch { body = {}; }
    throw new Error((body.error || ('http ' + r.status)) + (body.detail ? ' — ' + body.detail : ''));
  }
  const blob = await r.blob();
  if (ttsAudio.src && ttsAudio.src.startsWith('blob:')) URL.revokeObjectURL(ttsAudio.src);
  ttsAudio.src = URL.createObjectURL(blob);
  await ttsAudio.play();
}
async function speak(text) {
  if (!text) return;
  if (settings.speakResults === false) return; // muted by checkbox
  if (!ttsAvailable) { speakBrowser(text); return; }
  try { await speakElevenLabs(text); }
  catch (e) { log('voice fallback (' + e.message + ')'); speakBrowser(text); }
}
function stopTTS() {
  try { ttsAudio.pause(); ttsAudio.currentTime = 0; } catch {}
  if (window.speechSynthesis) speechSynthesis.cancel();
}

// =========================================================================
// Toggle button + status
// =========================================================================
const toggleBtn = document.getElementById('toggleBtn');
const statusText = document.getElementById('statusText');
const PLAY_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
const STOP_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>';
function setRunningUI(isRunning) {
  toggleBtn.classList.toggle('running', isRunning);
  toggleBtn.setAttribute('aria-label', isRunning ? 'Stop' : 'Start');
  toggleBtn.title = isRunning ? 'Stop active listening' : 'Start listening';
  toggleBtn.innerHTML = isRunning ? STOP_ICON : PLAY_ICON;
}

// =========================================================================
// Speech recognition
// =========================================================================
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) addSystem('SpeechRecognition not supported. Use Chrome.', true);

let recog = null;
let running = false;
let armed = false;
let commandBuf = '';
let commandTimer = null;

function getWakeWords() {
  return (settings.wakeWord || 'bro')
    .split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
}

function setStatusState(state, label) {
  // state: 'idle' | 'live' | 'armed' | 'busy'
  statusText.classList.remove('live','armed','busy');
  if (state !== 'idle') statusText.classList.add(state);
  statusText.textContent = label;
}
function waitingLabel() {
  return 'Say "' + (getWakeWords()[0] || 'trigger') + '"';
}
// Show the right status for whichever session is currently active.
// Called on session switch, dispatch start, and dispatch end.
function refreshActiveStatus() {
  if (armed) return; // armed state is owned by handleFinal
  if (!running) { setStatusState('idle', 'Stopped'); return; }
  const s = getActiveSession();
  if (s.inFlight) setStatusState('busy', 'Working…');
  else            setStatusState('live', waitingLabel());
}
const liveBtn = document.getElementById('liveBtn');
function refreshLiveBtn() {
  const s = getActiveSession();
  if (s && s.browserUseSessionId) {
    liveBtn.href = 'https://cloud.browser-use.com/session/' + s.browserUseSessionId;
    liveBtn.hidden = false;
  } else {
    liveBtn.hidden = true;
  }
}
// Show the play button only when an API key is set; otherwise show the
// pulsing yellow "First, add your Browser Use API key" call-to-action.
const needKeyBtn = document.getElementById('needKeyBtn');
function refreshControls() {
  const has = !!(settings.apiKey && settings.apiKey.trim());
  toggleBtn.hidden  = !has;
  statusText.hidden = !has;
  needKeyBtn.hidden = has;
}

function startListening() {
  if (running) return;
  if (!SR) { addSystem('SpeechRecognition not supported. Use Chrome.', true); return; }
  ensureAudioCtx();
  primeAudio();
  running = true;
  setRunningUI(true);
  setStatusState('live', waitingLabel());
  startWebSpeechMode();
  renderChat(); // drop clickable affordance from the empty placeholder
}
function stopListening() {
  running = false;
  if (recog) { try { recog.stop(); } catch {} recog = null; }
  // Tear down any in-progress recording too.
  if (commandRecorder && commandRecorder.state === 'recording') {
    try { commandRecorder.stop(); } catch {}
  }
  if (commandStream) { commandStream.getTracks().forEach(t => t.stop()); commandStream = null; }
  if (commandAudioCtx) { try { commandAudioCtx.close(); } catch {} commandAudioCtx = null; }
  armed = false;
  commandBuf = '';
  clearTimeout(commandTimer);
  stopTTS();
  setRunningUI(false);
  setStatusState('idle', 'Stopped');
  renderChat(); // re-add clickable affordance
}

// Web Speech fallback (only used if no ELEVENLABS_API_KEY env var on the server).
function startWebSpeechMode() {
  recog = new SR();
  recog.continuous = true;
  recog.interimResults = false;
  recog.lang = 'en-US';
  recog.onstart = () => pushLog('listening (web speech) for: ' + getWakeWords().join(', '));
  recog.onerror = (e) => {
    pushLog('recog error: ' + e.error);
    if (e.error === 'not-allowed') { addSystem('Microphone permission denied.', true); stopListening(); }
  };
  recog.onend = () => { if (running) try { recog.start(); } catch {} };
  recog.onresult = (ev) => {
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const res = ev.results[i];
      if (!res.isFinal) continue;
      const t = res[0].transcript.trim();
      if (t) handleFinal(t);
    }
  };
  recog.start();
}
let totalWords = 0;
const wordCountEl = document.getElementById('wordCount');
function bumpWords(text) {
  const n = text.trim().split(/\s+/).filter(Boolean).length;
  totalWords += n;
  wordCountEl.textContent = totalWords.toLocaleString();
}

function handleFinal(transcript) {
  pushLog(transcript);
  bumpWords(transcript);
  if (armed) return; // already capturing the command

  const wakes = getWakeWords();
  if (!wakes.length) return;
  // Word-boundary match — "bro" never matches "broccoli", "broker", "brother"…
  const escaped = wakes.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const re = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'i');
  if (!re.test(transcript)) return;

  armed = true;
  // Barge-in: if the agent is currently speaking, cut it off immediately.
  stopTTS();
  // Trigger sound — and ONLY after the ding does the recording start.
  // Anything Web Speech caught in this final chunk is intentionally discarded;
  // the user expects to speak only AFTER the notification.
  dingDetected();
  setStatusState('armed', 'Listening to your commands');

  if (sttAvailable) {
    captureCommandAfterTrigger();
  } else {
    // Fallback: command capture via Web Speech (no Scribe key set).
    commandBuf = '';
    clearTimeout(commandTimer);
    commandTimer = setTimeout(() => {
      if (commandBuf.trim()) dispatchCommand();
      else { armed = false; setStatusState('live', waitingLabel()); }
    }, 4000);
  }
}

// =========================================================================
// Capture command after the trigger word (Web Speech detects wake word →
// ding plays → ONLY THEN we record with the good mic + send to Scribe).
// =========================================================================
let commandStream    = null;
let commandAudioCtx  = null;
let commandRecorder  = null;
let placeholderEl    = null; // live "🎤 listening…" bubble in the chat

function addPlaceholderUserBubble() {
  // Strip stale "Heard nothing after the trigger word" lines from any
  // previous failed capture, so the user doesn't see them next to the new task.
  const s = getActiveSession();
  const before = s.chat.length;
  s.chat = s.chat.filter(m => !(m.role === 'system err' && m.text === 'Heard nothing after the trigger word'));
  if (s.chat.length !== before) { saveSessions(); renderChat(); }

  // Big centered listening banner — replaces any empty placeholder.
  const empty = chatEl.querySelector('.chat-empty');
  if (empty) empty.remove();
  placeholderEl = document.createElement('div');
  placeholderEl.className = 'listening-banner';
  placeholderEl.innerHTML = '<div class="mic">🎤</div><div class="label">Listening to your commands</div>';
  chatEl.appendChild(placeholderEl);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function finalizePlaceholder(text) {
  if (!placeholderEl) return;
  if (text) {
    // Replace the big listening banner with a real user bubble.
    const bubble = document.createElement('div');
    bubble.className = 'msg user';
    bubble.textContent = text;
    placeholderEl.replaceWith(bubble);
    // Persist into the active session's chat history.
    const s = getActiveSession();
    s.chat.push({ role: 'user', text });
    saveSessions();
  } else {
    placeholderEl.remove();
  }
  placeholderEl = null;
}

async function captureCommandAfterTrigger() {
  // Pause Web Speech so MediaRecorder can take the mic.
  // running=false BEFORE recog.stop() prevents the auto-restart in onend.
  const wasRunning = running;
  running = false;
  try { if (recog) recog.stop(); } catch {}
  recog = null;

  // Wait for the ding to finish before we open the mic — otherwise the beep
  // gets recorded into the Scribe upload.
  await new Promise(r => setTimeout(r, 280));

  try {
    commandStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        deviceId: settings.micId ? { exact: settings.micId } : undefined,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      },
    });
  } catch (e) {
    addSystem('Mic error: ' + e.message, true);
    armed = false;
    if (wasRunning && SR) try { startListening(); } catch {}
    return;
  }

  addPlaceholderUserBubble();
  pushLog('recording command…');

  const mimeCandidates = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg;codecs=opus'];
  const mime = mimeCandidates.find(m => MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) || '';
  commandRecorder = new MediaRecorder(commandStream, mime ? { mimeType: mime } : undefined);
  const chunks = [];
  commandRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };

  // Silence detection via Web Audio analyser.
  commandAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = commandAudioCtx.createMediaStreamSource(commandStream);
  const analyser = commandAudioCtx.createAnalyser();
  analyser.fftSize = 1024;
  src.connect(analyser);
  const buf = new Float32Array(analyser.fftSize);

  const startedAt = Date.now();
  const SILENCE_RMS  = 0.012;
  const SILENCE_MS   = 1500;
  const MIN_DURATION = 1500;   // give the user ~3s minimum to speak before silence can stop us
  const MAX_DURATION = 12000;
  let silenceStart = null;

  function tick() {
    if (!commandRecorder || commandRecorder.state !== 'recording') return;
    analyser.getFloatTimeDomainData(buf);
    let sum = 0;
    for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
    const rms = Math.sqrt(sum / buf.length);
    const elapsed = Date.now() - startedAt;
    if (elapsed > MAX_DURATION) { try { commandRecorder.stop(); } catch {} return; }
    if (elapsed < MIN_DURATION) { requestAnimationFrame(tick); return; }
    if (rms < SILENCE_RMS) {
      if (silenceStart == null) silenceStart = Date.now();
      else if (Date.now() - silenceStart > SILENCE_MS) { try { commandRecorder.stop(); } catch {} return; }
    } else {
      silenceStart = null;
    }
    requestAnimationFrame(tick);
  }

  commandRecorder.onstop = async () => {
    if (commandStream) { commandStream.getTracks().forEach(t => t.stop()); commandStream = null; }
    if (commandAudioCtx) { try { await commandAudioCtx.close(); } catch {} commandAudioCtx = null; }

    const blob = new Blob(chunks, { type: mime || 'audio/webm' });

    let text = '';
    try {
      const r = await fetch('/api/stt', {
        method: 'POST',
        headers: { 'Content-Type': blob.type || 'audio/webm' },
        body: blob,
      });
      const j = await r.json();
      if (!r.ok) { addSystem('Scribe error: ' + (j.error || 'unknown'), true); dingError(); }
      else      { text = (j.text || '').trim(); }
    } catch (e) {
      addSystem('Scribe fetch failed: ' + e.message, true);
      dingError();
    }

    armed = false;

    // Discard captures that are too short — almost certainly noise / fragment.
    const tooShort = text && text.length < 5;
    if (!text || tooShort) {
      // Throw away the placeholder bubble entirely; nothing gets persisted.
      if (placeholderEl) { placeholderEl.remove(); placeholderEl = null; }
      if (wasRunning && SR) {
        try { startListening(); } catch (e) { pushLog('restart recog failed: ' + e.message); }
      }
      if (!text) addSystem('Heard nothing after the trigger word', true);
      else       pushLog('ignored short transcript: ' + text);
      setStatusState(running ? 'live' : 'idle', running ? waitingLabel() : 'Stopped');
      return;
    }

    finalizePlaceholder(text);

    // Restart Web Speech for the next trigger word.
    if (wasRunning && SR) {
      try { startListening(); } catch (e) { pushLog('restart recog failed: ' + e.message); }
    }

    commandBuf = text;
    dispatchCommand();
  };

  commandRecorder.start();
  requestAnimationFrame(tick);
}

// =========================================================================
// Dispatch + polling
// =========================================================================
const pollers = new Map(); // localId -> intervalId

async function dispatchCommand() {
  const task = commandBuf.trim();
  commandBuf = '';
  armed = false;
  if (!task) { setStatusState('live', waitingLabel()); return; }
  if (!settings.apiKey) { addSystem('Add your Browser Use API key in settings.', true); dingError(); return; }

  const session = getActiveSession();
  // Any task currently running in this session has been superseded by the follow-up.
  let supersededAny = false;
  for (const t of session.tasks) {
    if (t.status === 'running') {
      t.status = 'stopped';
      t.output = 'Received follow-up';
      supersededAny = true;
    }
  }
  // Convert any in-flight pending chat bubble to a "Received follow-up" line.
  for (const m of session.chat) {
    if (m.role === 'pending') { m.role = 'system'; m.text = 'Received follow-up'; }
  }
  // Cancel the old poller — startPolling will replace it for the new task.
  if (pollers.has(session.localId)) {
    clearInterval(pollers.get(session.localId));
    pollers.delete(session.localId);
  }
  // The user message was already shown via the placeholder bubble in
  // captureCommandAfterTrigger; do not duplicate it here.
  const taskRecord = { id: uid(), task, status: 'running', output: null, steps: [], lastMessageId: null };
  session.tasks.push(taskRecord);
  // Live "working" bubble in the chat, tied to this taskRecord by id.
  session.chat.push({ role: 'pending', text: 'working', taskId: taskRecord.id });
  saveSessions();
  renderTasks();
  if (sessionsStore.active === session.localId) renderChat();
  setStatusState('busy', 'Working…');
  dingDispatched();

  try {
    const r = await fetch('/api/dispatch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        task,
        sessionId: session.browserUseSessionId || undefined,
        apiKey: settings.apiKey,
        workspaceId: settings.workspaceId || undefined,
        profileId: settings.profileId || undefined,
        proxyCountryCode: settings.proxyCC || 'us',
      }),
    });
    const j = await r.json();
    if (r.status === 410) {
      // Session was gone — clear and retry as a fresh session.
      session.browserUseSessionId = null;
      saveSessions();
      addSystem('Previous session expired. Creating a new one…');
      commandBuf = task; dispatchCommand();
      return;
    }
    if (!r.ok) {
      taskRecord.status = 'error';
      taskRecord.output = j.error || 'dispatch failed';
      saveSessions(); renderTasks();
      addSystem('Dispatch failed: ' + (j.error || 'unknown'), true);
      dingError();
      setStatusState(running ? 'live' : 'idle', running ? waitingLabel() : 'Stopped');
      return;
    }
    session.browserUseSessionId = j.sessionId;
    saveSessions();
    renderSessions();
    refreshLiveBtn();
    startPolling(session, taskRecord);
  } catch (e) {
    taskRecord.status = 'error';
    taskRecord.output = e.message;
    saveSessions(); renderTasks();
    dingError();
    setStatusState(running ? 'live' : 'idle', running ? waitingLabel() : 'Stopped');
  }
}

function startPolling(session, taskRecord) {
  const existing = pollers.get(session.localId);
  if (existing) clearInterval(existing);
  const intervalId = setInterval(async () => {
    if (!settings.apiKey || !session.browserUseSessionId) return;
    try {
      const r = await fetch('/api/session-result?sessionId=' + encodeURIComponent(session.browserUseSessionId)
        + '&apiKey=' + encodeURIComponent(settings.apiKey));
      const j = await r.json();

      const mr = await fetch('/api/session-messages?sessionId=' + encodeURIComponent(session.browserUseSessionId)
        + '&apiKey=' + encodeURIComponent(settings.apiKey)
        + (taskRecord.lastMessageId ? '&after=' + encodeURIComponent(taskRecord.lastMessageId) : ''));
      const mj = await mr.json();
      const msgs = mj.messages || mj.items || (Array.isArray(mj) ? mj : []) || [];
      const newSteps = [];
      for (const m of msgs) {
        if (m.summary && !m.hidden) newSteps.push(m.summary);
        if (m.id) taskRecord.lastMessageId = m.id;
      }
      if (newSteps.length) {
        taskRecord.steps = (taskRecord.steps || []).concat(newSteps);
        // Live-update the pending bubble with the latest step summary.
        const pending = session.chat.find(m => m.role === 'pending' && m.taskId === taskRecord.id);
        if (pending) pending.text = newSteps[newSteps.length - 1];
        saveSessions();
        if (sessionsStore.active === session.localId) { renderTasks(); renderChat(); }
      }

      if (j.status && j.status !== 'running') {
        clearInterval(intervalId);
        pollers.delete(session.localId);
        const isError = j.status === 'error';
        taskRecord.status = isError ? 'error' : 'done';
        taskRecord.output = j.output || '(no output)';
        const finalText = typeof taskRecord.output === 'string' && taskRecord.output.trim()
          ? taskRecord.output : 'no output returned';
        // Convert the pending bubble into the real assistant message in place.
        const pending = session.chat.find(m => m.role === 'pending' && m.taskId === taskRecord.id);
        if (pending) {
          pending.role = isError ? 'system err' : 'assistant';
          pending.text = finalText;
          delete pending.taskId;
        } else {
          session.chat.push({ role: isError ? 'system err' : 'assistant', text: finalText });
        }
        saveSessions();
        if (sessionsStore.active === session.localId) { renderTasks(); renderChat(); }
        if (isError) dingError(); else dingDone();
        speak(finalText);
        if (sessionsStore.active === session.localId) {
          setStatusState(running ? 'live' : 'idle', running ? waitingLabel() : 'Stopped');
        }
      }
    } catch (e) {
      pushLog('poll error: ' + e.message);
    }
  }, 2000);
  pollers.set(session.localId, intervalId);
}

async function destroyLocalSession(localId) {
  const idx = sessionsStore.list.findIndex(s => s.localId === localId);
  if (idx === -1) return;
  const s = sessionsStore.list[idx];
  // Stop any poller.
  if (pollers.has(localId)) { clearInterval(pollers.get(localId)); pollers.delete(localId); }
  // Destroy the BU session if there is one.
  if (s.browserUseSessionId && settings.apiKey) {
    try {
      await fetch('/api/destroy-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: s.browserUseSessionId, apiKey: settings.apiKey }),
      });
    } catch (e) { log('destroy error: ' + e.message); }
  }
  sessionsStore.list.splice(idx, 1);
  if (sessionsStore.active === localId) {
    sessionsStore.active = sessionsStore.list[0]?.localId || null;
  }
  saveSessions();
  if (!sessionsStore.list.length) newLocalSession();
  renderAll();
  refreshLiveBtn();
}

// =========================================================================
// Buttons
// =========================================================================
let wakeLock = null;
toggleBtn.onclick = async () => {
  if (running) { stopListening(); return; }
  startListening();
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch {}
};

document.getElementById('newSessionBtn').onclick = () => {
  newLocalSession();
  renderAll();
};

// Settings modal open/close.
const modalBackdrop = document.getElementById('modalBackdrop');
function openSettings()  { modalBackdrop.dataset.open = 'true'; }
function closeSettings() { modalBackdrop.dataset.open = 'false'; }
document.getElementById('settingsBtn').onclick = openSettings;
needKeyBtn.onclick = openSettings;
document.getElementById('modalCloseBtn').onclick = closeSettings;
modalBackdrop.addEventListener('click', (ev) => {
  if (ev.target === modalBackdrop) closeSettings();
});
document.addEventListener('keydown', (ev) => {
  if (ev.key === 'Escape' && modalBackdrop.dataset.open === 'true') closeSettings();
});

// Unlock audio on first interaction.
function unlockAudioOnce() {
  ensureAudioCtx();
  primeAudio();
  ['click','keydown','touchend'].forEach(e => document.removeEventListener(e, unlockAudioOnce, true));
}
['click','keydown','touchend'].forEach(e => document.addEventListener(e, unlockAudioOnce, true));

// =========================================================================
// Boot
// =========================================================================
async function boot() {
  if (!sessionsStore.list.length) newLocalSession();
  renderAll();
  refreshLiveBtn();
  refreshControls();
  checkTtsAvailable();
  await listDevices();

  if (!settings.apiKey) {
    // First-run experience: open settings immediately so the user knows what to do.
    openSettings();
    return;
  }
  refreshAllRemoteLists();

  if (!SR) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(t => t.stop());
    startListening();
  } catch (e) {
    addSystem('Microphone blocked. Click ▶ once you allow access.', true);
    pushLog('autostart blocked: ' + e.message);
  }
}
boot();
</script>
